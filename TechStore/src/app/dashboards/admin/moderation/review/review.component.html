<div class="d-flex flex-column gap-3"> 
    <div *ngIf="isLoading" class="text-center text-white">Loading...</div>
        <div *ngFor="let review of reviews" class="dark-card p-4 rounded shadow-sm"> 
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                <h5 class="text-white mb-1">
                    {{ review.product.name }}
                    <span class="badge bg-secondary ms-2" style="font-size: 0.7rem;">{{ review.productCondition }}</span>
                </h5>
                <p class="text-secondary small mb-0">
                    By {{ review.user.name }} • {{ review.createdAt | date:'mediumDate' }}
                </p>
                </div>
                
                <button 
                    class="btn btn-sm btn-danger-custom" 
                    (click)="deleteReview(review._id)"
                    title="Delete">
                    <i class="bi bi-trash"></i>
                </button>
            </div>

        <div class="d-flex align-items-center gap-1 mb-3">
            <ng-container *ngFor="let star of [1,2,3,4,5]; let i = index">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" 
                [attr.stroke]="i < review.rating ? '#f59e0b' : '#6b7280'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                [attr.fill]="i < review.rating ? '#f59e0b' : 'none'">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
            </ng-container>
            <span class="text-secondary small ms-2">({{ review.rating }}/5)</span>
        </div>

        <p class="text-white mb-4">{{ review.comment }}</p>
    </div>
</div>
