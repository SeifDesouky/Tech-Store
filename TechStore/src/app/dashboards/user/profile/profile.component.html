<div class="container-fluid profile-wrapper">
    <!-- Profile Section -->
    <section class="card-box">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="title">Profile Information</h2>
            <button class="btn custom-btn" (click)="openEditProfile()">
                <i class="bi bi-pencil"></i>
                Edit Profile
            </button>
        </div>

        <div class="row g-4 align-items-center">
        <div class="col-md-auto text-center">
            <div class="avatar">
            <i class="bi bi-person-fill"></i>
            </div>
        </div>

        <div class="col">
            <div class="mb-3">
                <label>Full Name</label>
                <p>{{user.name}}</p>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label>Email Address</label>
                    <p>{{user.email}}</p>
                </div>

                <div class="col-md-6">
                    <label>Phone Number</label>
                    <p>{{user.phone}}</p>
                </div>
            </div>

            <button class="btn btn-secondary" (click)="changePassword()">
                <i class="bi bi-lock"></i> Change Password
            </button>
        </div>
        </div>
    </section>

    <!-- Addresses Section -->
    <section class="card-box mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="title">Saved Addresses</h2>
        <button class="btn custom-btn" (click)="openAddAddress()">
            <i class="bi bi-plus-lg"></i>
            Add New Address
        </button>
        </div>

        <div class="row g-3">
        <div class="col-md-6" *ngFor="let address of addresses">
            <div class="address-card" [class.is-default]="address.isDefault">
            <div class="d-flex justify-content-between mb-2">
                <div class="d-flex align-items-center gap-2">
                <i class="bi bi-geo-alt-fill pin"></i>
                <h5>{{ address.label }}</h5>

                <span *ngIf="address.isDefault" class="badge default-badge">
                    Default
                </span>
                </div>

                <div class="actions">
                <button (click)="openEditAddress(address)" title="Edit"><i class="bi bi-pencil"></i></button>
                <button (click)="deleteAddress(address._id)" title="Delete"><i class="bi bi-trash"></i></button>
                </div>
            </div>

            <p class="address-text">
                {{ address.street }} <br>
                {{ address.city }}, {{ address.governorate }} {{ address.zipCode }}
            </p>

            <button *ngIf="!address.isDefault" class="btn btn-sm btn-link p-0 text-decoration-none set-default-link" (click)="setDefaultAddress(address._id)">
                Set as default
            </button>
            </div>
        </div>
        </div>
    </section>

</div>
<app-reset-password *ngIf="isChangingPassword" [token]="authToken" [isModal]="true" (close)="toggleChangePassword()"></app-reset-password>

<app-address-form
    *ngIf="isAddressFormOpen"
    [address]="editingAddress"
    (close)="closeAddressForm()"
    (saved)="onAddressSaved()">
</app-address-form>

<app-edit-profile-form
    *ngIf="isEditProfileOpen"
    [user]="user"
    (close)="closeEditProfile()"
    (saved)="loadUser()">
</app-edit-profile-form>
