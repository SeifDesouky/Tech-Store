
<div class="d-none d-lg-block">
    <div class="p-3 sidebar">
        <h3 class="header">My Account</h3>
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0 p-2">
            <li class="nav-item">
                <a class="nav-link" aria-current="page" routerLink="/user/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"><i class="fa-regular fa-user"></i> Profile</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" routerLink="/user/orders" routerLinkActive="active-link"><i class="fa-solid fa-cube"></i> Orders</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" routerLink="/user/reviews" routerLinkActive="active-link"><i class="fa-regular fa-star"></i> Reviews</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" routerLink="/user/notification" routerLinkActive="active-link"><i class="fa-regular fa-bell"></i> Notifications</a>
            </li> 
            <li class="nav-item">
                <a class="nav-link" routerLink="/user/wishlist" routerLinkActive="active-link"><i class="fa-regular fa-heart"></i> Wishlist</a>
            </li> 
            <div class="actions mt-5">
                <li class="nav-item back-btn">
                    <a class="nav-link" (click)="back()"><i class="fa-solid fa-arrow-left"></i> Back</a>
                </li> 

                <li class="nav-item logout-btn">
                    <a class="nav-link" (click)="logout()">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> LogOut
                    </a>
                </li> 
            </div>  
            
        </ul>
    </div>
</div>

<!-- offcanvas -->
<div class="slider-icon d-lg-none" data-bs-toggle="offcanvas" data-bs-target="#offcanvasWithBothOptions" aria-controls="offcanvasWithBothOptions">
    <i class="fa-solid fa-sliders"></i>
</div>

<div class="offcanvas offcanvas-start" data-bs-scroll="true" tabindex="-1" id="offcanvasWithBothOptions" aria-labelledby="offcanvasWithBothOptionsLabel">
    <div class="position-relative">
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body mt-3">
        <div class="bgdark-glass rounded-4">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 p-2">
            <li class="nav-item">
                <a class="nav-link" aria-current="page" routerLink="/user/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"><i class="fa-regular fa-user"></i> Profile</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" routerLink="/user/orders" routerLinkActive="active-link"><i class="fa-solid fa-cube"></i> Orders</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" routerLink="/user/reviews" routerLinkActive="active-link"><i class="fa-regular fa-star"></i> Reviews</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" routerLink="/user/notification" routerLinkActive="active-link"><i class="fa-regular fa-bell"></i> Notifications</a>
            </li> 
            <li class="nav-item">
                <a class="nav-link" routerLink="/user/wishlist" routerLinkActive="active-link"><i class="fa-regular fa-heart"></i> Wishlist</a>
            </li> 
            <div class="actions mt-5">
                <li class="nav-item back-btn">
                    <a class="nav-link" (click)="back()"><i class="fa-solid fa-arrow-left"></i> Back</a>
                </li> 

                <li class="nav-item logout-btn" >
                    <button class="nav-link btn btn-link logout-btn" (click)="logout()">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> LogOut
                    </button>
                </li> 
            </div>  
            
        </ul>

        </div>
    </div>
</div>
