<div class="auth-overlay">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Forgot Password</h2>
      <p>Enter your email to receive reset instructions</p>
    </div>

    <div class="alert alert-danger" *ngIf="error">
      {{ error }}
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" *ngIf="!showSuccess">
      <div class="form-group">
        <div class="input-wrapper">
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="Email Address"
            [class.is-invalid]="email?.invalid && email?.touched"
          />
        </div>
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Invalid email format</span>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="forgotForm.invalid || isLoading">
        <span *ngIf="!isLoading">Send Reset Link</span>
        <span *ngIf="isLoading">Sending...</span>
      </button>

      <div class="auth-footer">
        <p>Remember your password? <a class="auth-link" (click)="onLoginClick()">Sign In</a></p>
      </div>
    </form>

    <div class="success-message" *ngIf="showSuccess">
      <div class="success-icon">
        <i class="bi bi-check-circle"></i>
      </div>
      <h3>Check Your Email</h3>
      <p>We've sent password reset instructions to your email address.</p>
      <button type="button" class="btn-primary" (click)="onLoginClick()">
        Back to Sign In
      </button>
    </div>
  </div>
</div>
