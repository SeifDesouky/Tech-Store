<div class="auth-overlay">
  <div class="auth-card" style="position: relative;">
    <button *ngIf="isModal" (click)="close.emit()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer;">
      <i class="bi bi-x-lg"></i>
    </button>

    <div class="auth-header">
      <h2>{{ isModal ? 'Change Password' : 'Reset Password' }}</h2>
      <p>Enter your new password</p>
    </div>

    <!-- Error/Success Messages -->
    <div class="error-message" *ngIf="error" style="text-align: center; margin-bottom: 15px;">
        {{ error }}
    </div>
    <div class="success-message" *ngIf="success" style="color: #28a745; text-align: center; margin-bottom: 15px;">
        Password reset successfully!
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <!-- ... form fields ... -->
      <div class="form-group">
        <div class="input-wrapper">
          <i class="bi bi-lock"></i>
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-control"
            formControlName="password"
            placeholder="New Password"
            [class.is-invalid]="password?.invalid && password?.touched"
          />
          <i
            class="bi toggle-password"
            [class.bi-eye]="!showPassword"
            [class.bi-eye-slash]="showPassword"
            (click)="togglePassword()"
          ></i>
        </div>
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrapper">
          <i class="bi bi-lock-fill"></i>
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            class="form-control"
            formControlName="confirmPassword"
            placeholder="Confirm New Password"
            [class.is-invalid]="confirmPassword?.invalid && confirmPassword?.touched"
          />
          <i
            class="bi toggle-password"
            [class.bi-eye]="!showConfirmPassword"
            [class.bi-eye-slash]="showConfirmPassword"
            (click)="toggleConfirmPassword()"
          ></i>
        </div>
        <div class="error-message" *ngIf="confirmPassword?.invalid && confirmPassword?.touched">
          <span *ngIf="confirmPassword?.errors?.['required']">Confirm password is required</span>
        </div>
        <div class="error-message" *ngIf="resetForm.errors?.['passwordMismatch'] && confirmPassword?.touched">
          <span>Passwords do not match</span>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="resetForm.invalid || isLoading">
        <span *ngIf="!isLoading">{{ isModal ? 'Change Password' : 'Reset Password' }}</span>
        <span *ngIf="isLoading">Processing...</span>
      </button>

      <div class="auth-footer" *ngIf="!isModal">
        <p>Remember your password? <a (click)="onLoginClick()">Sign In</a></p>
      </div>
    </form>
  </div>
</div>
