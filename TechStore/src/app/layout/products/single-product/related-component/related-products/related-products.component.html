<div class="related-products-section">
  <div class="container-fluid">
    <h2 class="section-title">Products related to this item</h2>

    <div class="carousel-wrapper">
      <button class="carousel-arrow carousel-arrow-left" (click)="scrollLeft()" aria-label="Previous products">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>

      <div class="carousel-container" #carouselContainer>
        <div class="product-card" *ngFor="let product of products">
          <div class="product-image-wrapper">
            <img [src]="product.images?.[0]" [alt]="product.name" class="product-image">
          </div>

          <div class="product-content">
            <h3 class="product-title">{{ product.name }}</h3>
            <p class="product-description">{{ product.description }}</p>
            <div class="product-price">{{ product.price | currency:'EGP' }}</div>
            <button class="view-btn" [routerLink]="'/single-product/'+product._id">View</button>
          </div>
        </div>
      </div>

      <button class="carousel-arrow carousel-arrow-right" (click)="scrollRight()" aria-label="Next products">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>
  </div>
</div>
