<div class="min-vh-100 py-4 px-3" style="border:1px solid #2c2f33;">
  <div class="container-fluid" style="max-width: 1200px;">
    <h1 class="fw-bold fs-3 mb-4 text-white">My Tickets</h1>

    <div class="row g-3">
      <div class="col-12 col-lg-6" *ngFor="let ticket of tickets">
        <div class="card shadow-sm border-0 rounded-3 h-100" style="background-color: #23272a; border: 1px solid #2f3136 !important;">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div class="d-flex align-items-center gap-2">
                <span class="text-white fw-semibold">#</span>
                <span class="fw-bold text-white-50" style="font-size: 0.9rem;">{{ ticket.ticketNumber }}</span>
              </div>
              <span [ngClass]="getStatusBadgeClass(ticket.status)" class="px-3 py-1 rounded-pill" style="font-size: 0.8rem;">
                {{ ticket.status }}
              </span>
            </div>

            <h5 class="fw-semibold mb-3 text-white" style="font-size: 1.1rem;">
              {{ ticket.issueTitle }}
            </h5>

            <div class="d-flex flex-wrap gap-3 mb-3">
              <div class="d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="text-white" viewBox="0 0 16 16">
                  <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/>
                </svg>
                <small class="text-white">{{ ticket.createdAt | date:'MMM d, y' }}</small>
              </div>
              <div class="d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="text-white" viewBox="0 0 16 16">
                  <path d="M2.678 11.894a1 1 0 0 1 .287.801 10.97 10.97 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8.06 8.06 0 0 0 8 14c3.996 0 7-2.807 7-6 0-3.192-3.004-6-7-6S1 4.808 1 8c0 1.468.617 2.83 1.678 3.894zm-.493 3.905a21.682 21.682 0 0 1-.713.129c-.2.032-.352-.176-.273-.362a9.68 9.68 0 0 0 .244-.637l.003-.01c.248-.72.45-1.548.524-2.319C.743 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7-3.582 7-8 7a9.06 9.06 0 0 1-2.347-.306c-.52.263-1.639.742-3.468 1.105z"/>
                </svg>
                <small class="text-white">{{ ticket.messageCount }} messages</small>
              </div>
            </div>

            <div class="pt-2 border-top" style="border-color: #2f3136 !important;">
              <small class="text-white">
                Last updated: {{ ticket.lastUpdated | date:'MMM d, y h:mm a' }}
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="tickets.length === 0" class="text-center py-5">
      <div class="card shadow-sm border-0 rounded-3 p-5" style="background-color: #23272a;">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="text-white mx-auto mb-3" viewBox="0 0 16 16">
          <path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2zM9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5v2z"/>
        </svg>
        <h5 class="text-white mb-2">No tickets yet</h5>
        <p class="text-white mb-0">You haven't submitted any support tickets.</p>
      </div>
    </div>
  </div>
</div>
