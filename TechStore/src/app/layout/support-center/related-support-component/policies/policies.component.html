<div class="min-vh-100 py-5 px-3" style="border:1px solid #23272a;">
  <div class="container">
    <h1 class="fw-bold fs-2 mb-5 text-white">Policies & Information</h1>

    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-4" *ngFor="let policy of policies">
        <div class="card shadow-sm  rounded-3 h-100" style="background-color: #23272a; transition: transform 0.2s ease;">
          <div class="card-body d-flex align-items-center justify-content-between  p-4">
            <div class="d-flex justify-content-start mb-3">
              <div class="rounded-3 d-flex align-items-center justify-content-center me-2 "
                   style="width: 50px; height: 48px; background-color: #dc3545;">
                <i [ngClass]="policy.icon" class="text-white" style="font-size: 1.8rem;"></i>
              </div>
            </div>

            <div>
            <h5 class="fw-semibold text-white mb-2" style="font-size: 1.4rem;">
              {{ policy.title }}
            </h5>

            <p class="text-white mb-0 small">
              {{ policy.description }}
            </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center mt-5 pt-4">
      <p class="text-white-50 mb-2" style="font-size: 0.95rem;">
        Need immediate assistance?
        <span class="text-danger fw-semibold">Call us at 1-800-123-4567</span>
      </p>
      <div class="d-flex flex-column flex-sm-row justify-content-center gap-2 gap-sm-3">
        <small class="text-white">Monday - Friday: 9AM - 6PM EST</small>
        <span class="text-white d-none d-sm-inline">|</span>
        <small class="text-white">Saturday - Sunday: 10AM - 4PM EST</small>
      </div>
    </div>
  </div>
</div>
