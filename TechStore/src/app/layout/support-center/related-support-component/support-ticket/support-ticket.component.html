<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" >
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 bg rounded-3 bord ">
        <div class="card shadow-sm border-0 bg rounded-3">
          <div class="card-body p-4 p-md-5">
            <div class="mb-4">
              <h1 class="fw-bold mb-2" style="  font-size: 3rem;
  font-weight: 700;
  color: #ffffff;">Create Support Ticket</h1>
              <p class="text-white mb-0">Can't find an answer? Submit a ticket and our team will get back to you within 24 hours.</p>
            </div>

            <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()">
              <div class="row g-3 bg">
                <div class="col-md-6">
                  <label for="name" class="form-label fw-semibold">
                    Name <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    class="form-control rounded-3 py-2"
                    [class.is-invalid]="submitted && f['name'].errors"
                    id="name"
                    formControlName="name"
                    placeholder=""
                    style="background-color: #2d3238; border: 1px solid #3d4349; color: #fff;">
                  <div *ngIf="submitted && f['name'].errors" class="invalid-feedback">
                    <div *ngIf="f['name'].errors['required']">Name is required</div>
                  </div>
                </div>

                <div class="col-md-6">
                  <label for="email" class="form-label fw-semibold">
                    Email <span class="text-danger">*</span>
                  </label>
                  <input
                    type="email"
                    class="form-control rounded-3 py-2"
                    [class.is-invalid]="submitted && f['email'].errors"
                    id="email"
                    formControlName="email"
                    placeholder=""
                    style="background-color: #2d3238; border: 1px solid #3d4349; color: #fff;">
                  <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                    <div *ngIf="f['email'].errors['required']">Email is required</div>
                    <div *ngIf="f['email'].errors['email']">Please enter a valid email</div>
                  </div>
                </div>

                <div class="col-md-6">
                  <label for="issueType" class="form-label fw-semibold">
                    Issue Type <span class="text-danger">*</span>
                  </label>
                  <select
                    class="form-select rounded-3 py-2"
                    [class.is-invalid]="submitted && f['issueType'].errors"
                    id="issueType"
                    formControlName="issueType"
                    style="background-color: #2d3238; border: 1px solid #3d4349; color: #9ca3af;">
                    <option *ngFor="let type of issueTypes" [value]="type.value">
                      {{ type.label }}
                    </option>
                  </select>
                  <div *ngIf="submitted && f['issueType'].errors" class="invalid-feedback">
                    <div *ngIf="f['issueType'].errors['required']">Issue type is required</div>
                  </div>
                </div>

                <div class="col-md-6">
                  <label for="orderNumber" class="form-label fw-semibold ">
                    Order Number <span class="text-white">(Optional)</span>
                  </label>
                  <input
                    type="text"
                    class="form-control rounded-3 py-2"
                    id="orderNumber"
                    formControlName="orderNumber"
                    placeholder="e.g., ORD-123456"
                    style="background-color: #2d3238; border: 1px solid #3d4349; color: #fff;">
                </div>

                <div class="col-12">
                  <label for="message" class="form-label fw-semibold">
                    Message <span class="text-danger">*</span>
                  </label>
                  <textarea
                    class="form-control rounded-3"
                    [class.is-invalid]="submitted && f['message'].errors"
                    id="message"
                    formControlName="message"
                    rows="6"
                    placeholder="Please describe your issue in detail..."
                    style="background-color: #2d3238; border: 1px solid #3d4349;"></textarea>
                  <div *ngIf="submitted && f['message'].errors" class="invalid-feedback">
                    <div *ngIf="f['message'].errors['required']">Message is required</div>
                  </div>
                </div>

                <div class="col-12 mt-4">
                  <button type="submit" class="btn btn-lg rounded-3 px-4 py-2 fw-semibold" style="background-color: #dc2626; border: none; color: white;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-send-fill me-2" viewBox="0 0 16 16" style="margin-bottom: 2px;">
                      <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/>
                    </svg>
                    Submit Ticket
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
